<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playfit - 함께 놀아요!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
    <script>
      try {
        var fs = localStorage.getItem('playfit-font-scale');
        var ps = localStorage.getItem('playfit-pointer-scale');
        if (fs) document.documentElement.style.setProperty('--font-scale', fs);
        if (ps) document.documentElement.style.setProperty('--pointer-scale', ps);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
